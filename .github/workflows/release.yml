name: Release

# Publishes to npm with provenance when a version tag is pushed.
# The tag push IS the release approval: `npm version x.y.z` locally, then
# `git push origin main --follow-tags`.
#
# One-time setup on npmjs.com (no token/secret needed anywhere):
#   package settings -> Trusted Publisher -> GitHub Actions ->
#   repository: craibuc/node-adp-workforce-now, workflow: release.yml
# npm then accepts the publish via GitHub's OIDC identity and attaches a
# provenance attestation linking the tarball to this exact commit and run.

on:
  push:
    tags: ['v*']

permissions:
  contents: read
  id-token: write # OIDC for npm trusted publishing / provenance

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Verify both runtimes before anything reaches the registry.
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run typecheck
      - run: bun test
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm install
      - run: npm run test:node

      # Guard: the tag must match package.json's version.
      - run: |
          TAG="${GITHUB_REF_NAME#v}"
          PKG="$(node -p "require('./package.json').version")"
          if [ "$TAG" != "$PKG" ]; then
            echo "Tag v$TAG does not match package.json version $PKG" >&2
            exit 1
          fi

      - run: npm publish --access public --provenance
